{% extends "layout_template.njk" %}
{% from "components/formElements.njk" import errorsFor %}
{% block content %}
  <h1 class="govuk-heading-l">Import Case Definition</h1>
  <div class="govuk-grid-row">
    <div class="govuk-grid-column-two-thirds">
      <form action="/import" method="post" enctype="multipart/form-data">
        <div class="govuk-form-group">
          {% include "components/response.njk" %}
          {{ errorsFor("file", error) }}
          <input class="govuk-input" type="file" id="file" name="file" accept=".xlsx"/>
        </div>
        <div class="govuk-form-group">
          <button type="submit" class="govuk-button" data-module="govuk-button" value="Submit">Submit</button>
        </div>
      </form>

    </div>
  </div>
  {% include "components/import-audits_inc.njk" %}
{% endblock %}
